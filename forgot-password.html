<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hafiltcom - استعادة كلمة المرور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-effect p-8 rounded-3xl shadow-2xl">
        <!-- Back Button -->
        <a href="login.html" class="inline-flex items-center text-gray-500 hover:text-blue-600 mb-6 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 12H5m7 7l-7-7 7-7" />
            </svg>
            العودة لتسجيل الدخول
        </a>

        <!-- Header -->
        <div class="text-center mb-8">
            <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">نسيت كلمة المرور؟</h1>
            <p class="text-gray-500 mt-2">لا تقلق، أدخل بريدك الإلكتروني وسنرسل لك رابطاً لتعيين كلمة مرور جديدة.</p>
        </div>

        <form id="forgotPasswordForm" class="space-y-6">
            <!-- Email Input -->
            <div>
                <label class="block text-gray-700 font-bold mb-2">البريد الإلكتروني</label>
                <input type="email" id="resetEmail" required 
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all text-left"
                    placeholder="example@mail.com">
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg transform hover:-translate-y-1">
                إرسال رابط الاستعادة
            </button>
        </form>

        <!-- Status Message (Hidden by default) -->
        <div id="statusMessage" class="mt-6 p-4 rounded-xl hidden text-center">
            <!-- Message will be injected here via JS -->
        </div>
    </div>

    <!-- Firebase Integration Logic (Placeholder) -->
    <script type="module">
        /* هنا سيتم استيراد دوال Firebase لإرسال إيميل الاستعادة:
        import { sendPasswordResetEmail } from "firebase/auth";
        */

        const form = document.getElementById('forgotPasswordForm');
        const statusMsg = document.getElementById('statusMessage');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            
            // محاكاة الإرسال
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "جاري الإرسال...";

            setTimeout(() => {
                statusMsg.classList.remove('hidden', 'bg-red-100', 'text-red-700');
                statusMsg.classList.add('bg-green-100', 'text-green-700');
                statusMsg.innerText = "تم إرسال رابط استعادة كلمة المرور إلى بريدك الإلكتروني بنجاح!";
                submitBtn.disabled = false;
                submitBtn.innerText = "إرسال رابط الاستعادة";
            }, 1500);
        });
    </script>

</body>
</html>
