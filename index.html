<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hafiltcom</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="light-theme">

    <!-- شاشة الترحيب -->
    <div id="splash-screen">
        <div class="splash-content">
            <img src="hafiltcom.png" alt="Hafiltcom" id="splash-logo">
            <h1 class="splash-title">Hafiltcom</h1>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div id="app-content" class="hidden">
        <header>
            <nav class="container nav-wrapper">
                <div class="logo-area">
                    <img src="hafiltcom.png" alt="Logo" class="nav-logo">
                    <span class="brand">Hafiltcom</span>
                </div>
                
                <!-- زر القائمة للهواتف -->
                <button class="menu-toggle" id="menu-toggle" aria-label="فتح القائمة">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <ul class="nav-links" id="nav-links">
                    <li><a href="#home">الرئيسية</a></li>
                    <li><a href="#offers">عروضنا</a></li>
                    <li><a href="#about">نبذة عنا</a></li>
                    <li><button onclick="showDashboard('client')" 
                </ul>
            </nav>
        </header>

        <main>
            <!-- Hero Section -->
            <section id="home" class="hero">
                <div class="container hero-content">
                    <h1>مستقبل النقل في الجزائر بين يديك</h1>
                    <p>أول منصة رقمية متكاملة لركوب الحافلات عبر بطاقات الـ RFID الذكية.</p>
                    <div class="hero-actions">
                        <button class="btn-primary" onclick="openModal('auth-modal')">ابدأ الآن</button>
                        <button class="btn-secondary">اكتشف المزيد</button>
                    </div>
                </div>
            </section>

            <!-- عروضنا -->
            <section id="offers" class="section container">
                <h2 class="section-title">عروضنا</h2>
                <div class="responsive-grid">
                    <div class="price-card">
                        <h3>مجانية</h3>
                        <p class="price">0 دج</p>
                        <button class="btn-outline">اختيار</button>
                    </div>
                    <div class="price-card featured">
                        <div class="popular-badge">الأكثر طلباً</div>
                        <h3>شهرية</h3>
                        <p class="price">عرض خاص</p>
                        <button class="btn-primary">اشتراك</button>
                    </div>
                    <div class="price-card">
                        <h3>سنوية</h3>
                        <p class="price">توفير 30%</p>
                        <button class="btn-outline">اشتراك</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

   

    <script src="script.js"></script>
</body>
</html>
