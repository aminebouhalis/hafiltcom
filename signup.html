<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hafiltcom - إنشاء حساب جديد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            /* اللون الأزرق المائل للخضر كخلفية متدرجة */
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-focus:focus {
            border-color: #0d9488;
            box-shadow: 0 0 0 2px rgba(13, 148, 136, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden animate-fade-in-up">
        <div class="flex flex-col md:flex-row">
            
            <!-- الجانب الأيسر: معلومات ترحيبية -->
            <div class="md:w-1/3 bg-teal-900 text-white p-8 flex flex-col justify-center items-center text-center">
                <div class="mb-4">
                    <i class="fas fa-bus-alt text-5xl text-teal-300"></i>
                </div>
                <h2 class="text-2xl font-bold mb-2">انضم إلينا</h2>
                <p class="text-teal-100 text-sm">كن جزءاً من مستقبل النقل الذكي في الجزائر. حساب واحد، رحلات لا نهائية.</p>
                <div class="mt-8">
                    <span class="text-xs text-teal-400">لديك حساب بالفعل؟</span>
                    <a href="login.html" class="block mt-2 text-white font-bold border border-white rounded-full px-4 py-2 hover:bg-white hover:text-teal-900 transition-all">تسجيل الدخول</a>
                </div>
            </div>

            <!-- الجانب الأيمن: نموذج التسجيل -->
            <div class="md:w-2/3 p-8">
                <h1 class="text-3xl font-bold text-teal-900 mb-6 text-center">إنشاء حساب جديد</h1>
                
                <!-- تبديل نوع الحساب -->
                <div class="flex bg-gray-100 rounded-xl p-1 mb-8">
                    <button id="tabClient" onclick="switchRole('client')" class="flex-1 py-2 rounded-lg font-semibold text-teal-800 bg-white shadow-sm transition-all">
                        <i class="fas fa-user-friends ml-2"></i>راكب
                    </button>
                    <button id="tabDriver" onclick="switchRole('driver')" class="flex-1 py-2 rounded-lg font-semibold text-gray-500 hover:text-teal-700 transition-all">
                        <i class="fas fa-id-card ml-2"></i>ناقل / سائق
                    </button>
                </div>

                <form id="signupForm" class="space-y-4">
                    <!-- الحقول المشتركة -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-sm font-semibold text-gray-700">الاسم الكامل</label>
                            <input type="text" placeholder="مثلاً: محمد علي" class="w-full p-3 rounded-xl border border-gray-200 outline-none input-focus transition-all" required>
                        </div>
                        <div class="space-y-1">
                            <label class="text-sm font-semibold text-gray-700">رقم الهاتف</label>
                            <input type="tel" placeholder="05 / 06 / 07" class="w-full p-3 rounded-xl border border-gray-200 outline-none input-focus transition-all text-left" dir="ltr" required>
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-sm font-semibold text-gray-700">البريد الإلكتروني</label>
                        <input type="email" placeholder="name@example.com" class="w-full p-3 rounded-xl border border-gray-200 outline-none input-focus transition-all text-left" dir="ltr" required>
                    </div>

                    <!-- حقول خاصة بالسائق (تظهر فقط عند اختيار ناقل) -->
                    <div id="driverFields" class="hidden space-y-4 animate-fade-in">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-teal-100 pt-4">
                            <div class="space-y-1">
                                <label class="text-sm font-semibold text-teal-700">رقم الناقل (الخط)</label>
                                <input type="text" placeholder="مثلاً: خط 15" class="w-full p-3 rounded-xl border border-teal-200 outline-none input-focus transition-all">
                            </div>
                            <div class="space-y-1">
                                <label class="text-sm font-semibold text-teal-700">الرقم التسلسلي للحافلة</label>
                                <input type="text" placeholder="VIN Number" class="w-full p-3 rounded-xl border border-teal-200 outline-none input-focus transition-all">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-sm font-semibold text-teal-700">نقطة الانطلاق</label>
                                <input type="text" placeholder="من.." class="w-full p-3 rounded-xl border border-teal-200 outline-none input-focus transition-all">
                            </div>
                            <div class="space-y-1">
                                <label class="text-sm font-semibold text-teal-700">نقطة الوصول</label>
                                <input type="text" placeholder="إلى.." class="w-full p-3 rounded-xl border border-teal-200 outline-none input-focus transition-all">
                            </div>
                        </div>
                    </div>

                    <!-- كلمة المرور -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-1 relative">
                            <label class="text-sm font-semibold text-gray-700">كلمة المرور</label>
                            <input id="password" type="password" placeholder="••••••••" class="w-full p-3 rounded-xl border border-gray-200 outline-none input-focus transition-all" required>
                        </div>
                        <div class="space-y-1">
                            <label class="text-sm font-semibold text-gray-700">تأكيد كلمة المرور</label>
                            <input type="password" placeholder="••••••••" class="w-full p-3 rounded-xl border border-gray-200 outline-none input-focus transition-all" required>
                        </div>
                    </div>

                    <!-- موافقة الشروط -->
                    <div class="flex items-center space-x-2 space-x-reverse text-sm text-gray-600 mt-4">
                        <input type="checkbox" class="w-4 h-4 text-teal-600 border-gray-300 rounded focus:ring-teal-500" required>
                        <span>أوافق على <a href="#" class="text-teal-700 font-bold underline">شروط الخدمة</a> وسياسة الخصوصية.</span>
                    </div>

                    <!-- زر الإرسال -->
                    <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 rounded-xl shadow-lg transform transition-all active:scale-95 mt-6">
                        تأكيد وإنشاء الحساب
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let currentRole = 'client';

        function switchRole(role) {
            currentRole = role;
            const driverFields = document.getElementById('driverFields');
            const tabClient = document.getElementById('tabClient');
            const tabDriver = document.getElementById('tabDriver');

            if (role === 'driver') {
                driverFields.classList.remove('hidden');
                tabDriver.classList.add('bg-white', 'shadow-sm', 'text-teal-800');
                tabDriver.classList.remove('text-gray-500');
                tabClient.classList.remove('bg-white', 'shadow-sm', 'text-teal-800');
                tabClient.classList.add('text-gray-500');
            } else {
                driverFields.classList.add('hidden');
                tabClient.classList.add('bg-white', 'shadow-sm', 'text-teal-800');
                tabClient.classList.remove('text-gray-500');
                tabDriver.classList.remove('bg-white', 'shadow-sm', 'text-teal-800');
                tabDriver.classList.add('text-gray-500');
            }
        }

        document.getElementById('signupForm').onsubmit = function(e) {
            e.preventDefault();
            // سيتم ربط منطق Firebase هنا لاحقاً (تأكيد الهاتف والبريد)
            const roleText = currentRole === 'client' ? 'راكب' : 'سائق';
            
            // رسالة نجاح تجريبية مخصصة للثيم
            const successMsg = document.createElement('div');
            successMsg.className = "fixed top-5 left-1/2 transform -translate-x-1/2 bg-teal-800 text-white px-8 py-4 rounded-2xl shadow-2xl z-50 flex items-center space-x-4 space-x-reverse border-2 border-teal-400";
            successMsg.innerHTML = `<i class="fas fa-check-circle text-2xl text-teal-300"></i> <span>جاري إرسال كود التأكيد لهاتفك (${roleText})..</span>`;
            document.body.appendChild(successMsg);
            
            setTimeout(() => successMsg.remove(), 3000);
        };
    </script>

    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.6s ease-out; }
        .animate-fade-in { animation: fadeInUp 0.4s ease-out; }
    </style>
</body>
</html>
