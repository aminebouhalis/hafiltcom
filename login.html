<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hafiltcom - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4" style="background-image: url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80'); background-size: cover; background-position: center;">

    <div class="glass-effect w-full max-w-md p-8 rounded-3xl shadow-2xl">
        <!-- الشعار -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-blue-600 mb-2">Hafiltcom</h1>
            <p class="text-gray-600">سجل دخولك لتكمل رحلتك</p>
        </div>

        <!-- نموذج تسجيل الدخول -->
        <form id="loginForm" class="space-y-6">
            <!-- البريد الإلكتروني أو الهاتف -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">البريد الإلكتروني أو رقم الهاتف</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" placeholder="example@mail.com" class="w-full pr-10 pl-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
                </div>
            </div>

            <!-- كلمة المرور مع ميزة الإظهار -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">كلمة المرور</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="passwordField" placeholder="••••••••" class="w-full pr-10 pl-12 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
                    <!-- زر إظهار/إخفاء كلمة المرور -->
                    <button type="button" onclick="togglePassword()" class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500 hover:text-blue-600 focus:outline-none transition-colors">
                        <i id="eyeIcon" class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="text-left mt-2">
                    <a href="forgot-password.html" class="text-xs text-blue-600 hover:underline">نسيت كلمة المرور؟</a>
                </div>
            </div>

            <!-- زر تسجيل الدخول -->
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transform transition hover:-translate-y-1">
                تسجيل الدخول
            </button>
        </form>

        <!-- روابط إضافية -->
        <div class="mt-8 text-center">
            <p class="text-gray-600">ليس لديك حساب؟ 
                <a href="signup.html" class="text-blue-600 font-bold hover:underline">انضم إلينا الآن</a>
            </p>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordField = document.getElementById('passwordField');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordField.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        // منع إرسال الفورم حالياً للتوضيح
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            console.log('محاولة تسجيل الدخول...');
        };
    </script>
</body>
</html>
